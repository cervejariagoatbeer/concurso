<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Análise</title>

<style>
body {
    margin: 0;
    background: #020202;
    color: #00ffcc;
    font-family: Consolas, monospace;
}

.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: auto auto;
    gap: 15px;
    padding: 20px;
}

/* TÍTULO */
.header {
    grid-column: 1 / 3;
    text-align: center;
    font-size: 28px;
    padding: 10px;
    border: 1px solid #00ffcc;
    box-shadow: 0 0 15px #00ffcc;
}

/* TERMINAL */
.terminal {
    height: 180px;
    overflow: hidden;
    border: 1px solid #00ffcc;
    padding: 10px;
    box-shadow: 0 0 10px #00ffcc;
}

/* MAPA */
.map {
    position: relative;
    height: 400px;
    background: radial-gradient(circle, #001a1a, #000);
    border: 1px solid #00ffcc;
    box-shadow: 0 0 15px #00ffcc;
}

/* ROTA */
.route {
    position: absolute;
    width: 100%;
    height: 100%;
}

.dot {
    width: 8px;
    height: 8px;
    background: #00ffcc;
    border-radius: 50%;
    position: absolute;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.5); opacity: 0.5; }
}

/* LINHA ANIMADA */
.line {
    position: absolute;
    height: 2px;
    background: #00ffcc;
    transform-origin: left;
    animation: draw 4s linear infinite;
}

@keyframes draw {
    from { width: 0; }
    to { width: 100%; }
}

/* DADOS */
.panel {
    border: 1px solid #00ffcc;
    padding: 10px;
    box-shadow: 0 0 10px #00ffcc;
}

/* TIMELINE */
.timeline div {
    margin-bottom: 6px;
}

/* GLITCH */
.glitch {
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 2px red; }
    50% { text-shadow: -2px -2px blue; }
    100% { text-shadow: 2px 2px red; }
}
</style>

</head>

<body>

<div class="container">

<div class="header glitch">
[SISTEMA DE ANÁLISE E MONITORAMENTO]
</div>

<div class="terminal" id="terminal"></div>

<div class="panel">
<h3>DADOS</h3>
<p>Nome: <b>USUÁRIO IDENTIFICADO</b></p>
<p>Status: Ativo</p>
<p>Área: Educação</p>
<p>Região: Sul do Brasil</p>
</div>

<div class="map">

<!-- PONTOS -->
<div class="dot" style="top:60%; left:30%;"></div>
<div class="dot" style="top:40%; left:50%;"></div>
<div class="dot" style="top:70%; left:70%;"></div>

<!-- LINHAS -->
<div class="line" style="top:60%; left:30%; width:200px;"></div>
<div class="line" style="top:40%; left:50%; width:150px;"></div>

</div>

<div class="panel">
<h3>LINHA DO TEMPO</h3>
<div class="timeline">
<div>2022 → Formação concluída</div>
<div>2023 → Atividade profissional</div>
<div>2024 → Registro acadêmico</div>
<div>2025 → Atualização funcional</div>
<div>2026 → Status ativo</div>
</div>
</div>

</div>

<script>
const linhas = [
"> Inicializando sistema...",
"> Carregando base de dados...",
"> Cruzando informações...",
"> Gerando mapa de atividade...",
"> Análise concluída."
];

let i = 0, j = 0, texto = "";

function escrever() {
    if (i < linhas.length) {
        if (j < linhas[i].length) {
            texto += linhas[i][j];
            document.getElementById("terminal").innerHTML = texto;
            j++;
            setTimeout(escrever, 30);
        } else {
            texto += "<br>";
            i++; j = 0;
            setTimeout(escrever, 300);
        }
    }
}

escrever();
</script>

</body>
</html>

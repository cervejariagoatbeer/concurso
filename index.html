<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Consulta de Resultado</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f1f3f8;
margin:0;
text-align:center;
}

.topo{
background:#0b3d91;
padding:20px;
color:white;
}

.logo{
height:70px;
margin-bottom:10px;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:70%;
padding:12px;
font-size:16px;
margin-top:20px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
margin-top:15px;
background:#0b3d91;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#082b66;
}

.perfil{
display:flex;
align-items:center;
gap:20px;
margin-top:30px;
text-align:left;
}

.foto{
width:120px;
border-radius:8px;
}

.titulo{
color:#0b3d91;
margin-top:30px;
border-bottom:2px solid #ddd;
padding-bottom:5px;
text-align:left;
}

.tabela{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.tabela th{
background:#0b3d91;
color:white;
padding:10px;
}

.tabela td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.aprovado{
background:#1f8b3c;
color:white;
padding:15px;
font-size:20px;
margin-top:20px;
border-radius:6px;
}

.lista{
text-align:left;
margin-top:10px;
}

</style>

</head>

<body>

<div class="topo">

<img src="logo.jpeg" class="logo">

<h1>Consulta de Confirmação de Vaga</h1>

</div>

<div class="container">

<br>

<button onclick="consultar()">Consultar</button>

<div id="resultado"></div>

</div>

if(nome.toLowerCase() == "maicon aurélio do prado"){

document.getElementById("resultado").innerHTML = `

</div>

<table class="tabela">

<tr>

</tr>

</tr>

</tr>

</table>

<div class="aprovado">

<p>Batalhão Balneário Camboriú – Santa Catarina</p>

`;

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Central de Análise</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    background: #0b0f14;
    color: #00ffc6;
    font-family: Consolas, monospace;
}

.container {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
}

/* PAINEL LATERAL */
.sidebar {
    border-right: 1px solid #00ffc6;
    padding: 15px;
    background: rgba(0,255,198,0.05);
    box-shadow: 0 0 10px #00ffc6;
}

.title {
    font-size: 18px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #00ffc6;
}

.block {
    margin-bottom: 15px;
    border: 1px solid #00ffc6;
    padding: 10px;
}

/* MAPA */
#map {
    width: 100%;
    height: 100%;
}

/* TERMINAL */
.terminal {
    height: 120px;
    overflow: hidden;
    font-size: 12px;
}

/* LINHA DE SCAN */
.scan {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #00ffc6;
    animation: scan 3s linear infinite;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}
</style>
</head>

<body>

<div class="container">

<!-- LATERAL -->
<div class="sidebar">

<div class="title">[ CENTRAL DE DADOS ]</div>

<div class="block">
<b>IDENTIFICAÇÃO</b><br>
Nome: USUÁRIO ANALISADO<br>
Status: Ativo<br>
Cidade: Foz do Iguaçu<br>
Área: Educação
</div>

<div class="block terminal" id="terminal"></div>

<div class="block">
<b>EVENTOS</b><br>
2022 → Registro acadêmico<br>
2023 → Atividade profissional<br>
2024 → Atualização<br>
2025 → Monitoramento<br>
</div>

</div>

<!-- MAPA -->
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAPA CENTRALIZADO EM FOZ DO IGUAÇU
var map = L.map('map').setView([-25.5469, -54.5882], 13);

// CAMADA (ESTILO ESCURO)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

// PONTOS SIMULADOS
var pontos = [
    [-25.547, -54.588], // centro
    [-25.550, -54.590], // escola (simulado)
    [-25.545, -54.580]  // região urbana
];

// MARCADORES
pontos.forEach(p => {
    L.circleMarker(p, {
        color: "#00ffc6",
        radius: 6
    }).addTo(map);
});

// ROTA SIMULADA
var rota = L.polyline(pontos, {
    color: '#00ffc6'
}).addTo(map);

// TERMINAL
const linhas = [
"> Iniciando sistema...",
"> Conectando base...",
"> Carregando mapa...",
"> Inserindo pontos...",
"> Análise concluída."
];

let i = 0, j = 0, texto = "";

function escrever() {
    if (i < linhas.length) {
        if (j < linhas[i].length) {
            texto += linhas[i][j];
            document.getElementById("terminal").innerHTML = texto;
            j++;
            setTimeout(escrever, 25);
        } else {
            texto += "<br>";
            i++; j = 0;
            setTimeout(escrever, 200);
        }
    }
}

escrever();
</script>

</body>
</html>
